# docker-compose.yml — ReUp 一键部署
# 用法:
#   1. 复制 .env.local.example -> .env, 填入 DASHSCOPE_API_KEY
#   2. docker compose up -d --build
#   3. 访问 http://localhost:5000
#   4. 健康检查: curl http://localhost:5000/api/health
#
# 端口说明 (Dockerfile 与 compose 的端口拆分是有意为之):
#   - Dockerfile 默认 PORT=7860 + EXPOSE 7860: ModelScope Spaces 健康检查强制探测
#     7860 端口, 且 ms_deploy.json 的 environment_variables 在 ModelScope Docker
#     Studio beta 下不会下发到运行时, 故 7860 必须在镜像 ENV 里硬编码。
#   - docker-compose.yml (本文件) 面向本地 / fly.io: 通过运行时 env PORT=5000
#     覆盖镜像默认值, 容器内监听 5000, 宿主端口由 ${REUP_PORT:-5000} 映射。
#   - src/server.ts 只读 process.env.PORT (回落 '5000'), 不硬编码 7860/5000;
#     同一镜像因此可在 ModelScope (7860) 与本地 (5000) 两种端口下运行。
#
# Volume 说明:
#   - reup-db       : SQLite 数据库文件 (loop-engineering.sqlite)
#   - reup-models   : @xenova/transformers 模型缓存 (BGE-M3 ~2GB + reranker ~250MB)
#                     首次启动会下载, 之后从 volume 读取, 避免冷启动慢

services:
  reup:
    build:
      context: .
      dockerfile: Dockerfile
    image: reup:${REUP_VERSION:-latest}
    container_name: reup
    restart: unless-stopped

    ports:
      - "${REUP_PORT:-5000}:5000"

    environment:
      # ---- 运行时 ----
      NODE_ENV: production
      PORT: "5000"
      HOSTNAME: "0.0.0.0"

      # ---- LLM (必须, 从 .env 注入) ----
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?DASHSCOPE_API_KEY is required, copy .env.local.example to .env}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode}
      DASHSCOPE_CHAT_MODEL: ${DASHSCOPE_CHAT_MODEL:-qwen3.6-plus-2026-04-02}
      DASHSCOPE_EMBEDDING_MODEL: ${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v3}
      LLM_PROVIDER: ${LLM_PROVIDER:-dashscope}

      # ---- 智谱 GLM (可选, 用于 GLM 系列模型及 fallback) ----
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      ZHIPU_BASE_URL: ${ZHIPU_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}

      # ---- 数据库 (挂载 volume 持久化) ----
      LOOP_ENGINEERING_DB: /app/data/loop-engineering.sqlite
      # 覆盖 Dockerfile 的 /mnt/workspace/config 回到 reup-db volume 挂载点 (/app/data),
      # 使 admin 配置 (server-config.json) 在 compose 部署中持久化 (非 ModelScope 场景)。
      REUP_CONFIG_DIR: /app/data

      # ---- 向量索引 (镜像内已 bake, 也可挂载覆盖) ----
      REUP_VECTORS_PATH: /app/data/skill-vectors.json

      # ---- 模型缓存 (挂载 volume 避免每次重启重下) ----
      HF_HOME: /app/.cache/hub
      TRANSFORMERS_CACHE: /app/.cache/hub
      TMPDIR: /app/.cache/tmp

      # ---- 简历解析 ----
      RESUME_PDF_LLM_FALLBACK: ${RESUME_PDF_LLM_FALLBACK:-false}

    volumes:
      # SQLite 数据库 — 持久化用户会话 / 反馈 / 评估结果
      - reup-db:/app/data
      # HuggingFace 模型缓存 — BGE-M3 + reranker, 首次下载后复用
      - reup-models:/app/.cache

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  reup-db:
    driver: local
  reup-models:
    driver: local
