name: Sync to ModelScope

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 部署约定（写死在 workflow 里，防止遗忘）：
      # - GitHub 主分支：main
      # - 魔搭空间默认部署分支：master（无法修改）
      # - 因此每次只把 GitHub main 强制推送到魔搭 master
      # - 魔搭上的 main 分支是历史残留，尝试删除
      - name: Sync to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          # 添加魔搭空间远程仓库
          git remote add modelscope https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/codengseam/reup.git

          # 获取魔搭空间所有分支
          git fetch modelscope

          # 强制推送 GitHub 的 main 到魔搭空间的 master
          # 魔搭空间默认部署 master 分支，这是唯一需要同步的目标分支
          git push modelscope main:master --force

          # 删除魔搭空间上的 main 分支（如果存在）
          # 该分支是旧配置残留，魔搭空间实际使用 master 作为默认分支
          git push modelscope --delete main || true

          # 删除其他可能存在的废弃分支
          git push modelscope --delete coze || true
