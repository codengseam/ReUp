name: Sync to ModelScope

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 部署约定（写死在 workflow 里，防止遗忘）：
      # - GitHub 主分支未来会改为 master；目前同时支持 main 和 master
      # - 魔搭空间 re_up 默认部署分支：master（无法修改，且受保护禁止 force push）
      # - 当前触发 push 的分支（GITHUB_REF_NAME）被同步到魔搭 master
      # - 历史分叉时，用 --allow-unrelated-histories 合并魔搭 master 后再 push
      # - 项目从 gitee → github → modelscope 演化，两边历史独立，必须允许无关历史合并
      # - 不预先 fetch 整个魔搭仓库（27MB skill-vectors.json + 全历史会触发 curl 18 RPC 中断）
      # - push 失败时只 shallow fetch master（--depth=1），merge 后再 push
      # - 魔搭上的 main 分支是历史残留，尝试删除
      - name: Sync to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          # 增大 HTTP 缓冲，避免大包传输被服务端提前关闭（curl 18）
          git config http.postBuffer 524288000

          # 添加魔搭空间远程仓库
          git remote add modelscope https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/codengseam/re_up.git

          # 普通 push 同步 GitHub 当前分支到魔搭 master（不用 --force，master 受保护）
          # GITHUB_REF_NAME 是当前触发 workflow 的分支名（main 或 master）
          if ! git push modelscope "${GITHUB_REF_NAME}:master"; then
            echo "Push rejected, shallow-fetching modelscope/master and merging with unrelated histories..."
            # 只 shallow fetch master 一个分支，避免拉取整个魔搭仓库历史
            git fetch modelscope master --depth=1
            # 项目从 gitee → github → modelscope 演化，两边历史独立
            # 必须用 --allow-unrelated-histories 才能合并
            git merge --no-edit --allow-unrelated-histories modelscope/master
            git push modelscope "${GITHUB_REF_NAME}:master"
          fi

          # 删除魔搭空间上的 main 分支（如果存在）
          # 该分支是旧配置残留，魔搭空间实际使用 master 作为默认分支
          git push modelscope --delete main || true

          # 删除其他可能存在的废弃分支
          git push modelscope --delete coze || true
