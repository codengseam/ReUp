name: Sync to ModelScope

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 部署约定（写死在 workflow 里，防止遗忘）：
      # - GitHub 主分支：main
      # - 魔搭空间默认部署分支：master（无法修改，且受保护禁止 force push）
      # - 因此每次用普通 push 把 GitHub main 同步到魔搭 master（fast-forward）
      # - 不预先 fetch 整个魔搭仓库（27MB skill-vectors.json + 全历史会触发 curl 18 RPC 中断）
      # - push 失败时只 shallow fetch master（--depth=1），merge 后再 push
      # - 魔搭上的 main 分支是历史残留，尝试删除
      - name: Sync to ModelScope
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
        run: |
          # 增大 HTTP 缓冲，避免大包传输被服务端提前关闭（curl 18）
          git config http.postBuffer 524288000

          # 添加魔搭空间远程仓库
          git remote add modelscope https://oauth2:${MODELSCOPE_TOKEN}@www.modelscope.cn/studios/codengseam/reup.git

          # 普通 push 同步 GitHub main 到魔搭 master（不用 --force，master 受保护）
          # 魔搭 master 之前同步过我们的代码，fast-forward 即可，无需预先 fetch
          if ! git push modelscope main:master; then
            echo "Fast-forward failed, shallow-fetching modelscope/master..."
            # 只 shallow fetch master 一个分支，避免拉取整个魔搭仓库历史
            git fetch modelscope master --depth=1
            git merge --no-edit modelscope/master
            git push modelscope main:master
          fi

          # 删除魔搭空间上的 main 分支（如果存在）
          # 该分支是旧配置残留，魔搭空间实际使用 master 作为默认分支
          git push modelscope --delete main || true

          # 删除其他可能存在的废弃分支
          git push modelscope --delete coze || true
